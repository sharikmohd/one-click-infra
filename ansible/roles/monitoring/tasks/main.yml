---
# 1. CREATE SYSTEM GROUPS AND USERS
- name: Create prometheus group
  group:
    name: prometheus
    system: yes
    state: present

- name: Create prometheus user
  user:
    name: prometheus
    group: prometheus
    system: yes
    shell: /sbin/nologin
    create_home: no
    state: present

- name: Create loki group
  group:
    name: loki
    system: yes
    state: present

- name: Create loki user
  user:
    name: loki
    group: loki
    system: yes
    shell: /sbin/nologin
    create_home: no
    state: present

# 2. CONFIGURE SHARED STORAGE ON EFS
# Note: EFS must be mounted at /mnt/efs by the ASG User Data before this playbook runs
- name: Create EFS base directories for monitoring data
  file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: '0775'
  loop:
    - { path: '/mnt/efs/prometheus/{{ ansible_hostname }}', owner: 'prometheus', group: 'prometheus' }
    - { path: '/mnt/efs/loki/{{ ansible_hostname }}', owner: 'loki', group: 'loki' }
    - { path: '/mnt/efs/grafana/{{ ansible_hostname }}', owner: 'root', group: 'root' }
  ignore_errors: yes # Avoid failing if grafana user is not created yet (will fix after grafana installation)

# 3. INSTALL PROMETHEUS NATIVELY
- name: Create Prometheus config and data directories
  file:
    path: "{{ item }}"
    state: directory
    owner: prometheus
    group: prometheus
    mode: '0755'
  loop:
    - /etc/prometheus
    - /var/lib/prometheus

- name: Download Prometheus binary
  get_url:
    url: "https://github.com/prometheus/prometheus/releases/download/v{{ prometheus_version }}/prometheus-{{ prometheus_version }}.linux-amd64.tar.gz"
    dest: "/tmp/prometheus.tar.gz"

- name: Extract Prometheus binary
  unarchive:
    src: "/tmp/prometheus.tar.gz"
    dest: "/tmp"
    remote_src: yes

- name: Copy Prometheus binaries to /usr/local/bin
  copy:
    src: "/tmp/prometheus-{{ prometheus_version }}.linux-amd64/{{ item }}"
    dest: "/usr/local/bin/{{ item }}"
    owner: prometheus
    group: prometheus
    mode: '0755'
    remote_src: yes
  loop:
    - prometheus
    - promtool

- name: Copy Prometheus helper directories to /etc/prometheus
  copy:
    src: "/tmp/prometheus-{{ prometheus_version }}.linux-amd64/{{ item }}"
    dest: "/etc/prometheus/{{ item }}"
    owner: prometheus
    group: prometheus
    mode: '0755'
    remote_src: yes
  loop:
    - consoles
    - console_libraries

- name: Template Prometheus alert rules file
  template:
    src: alert.rules.yml.j2
    dest: /etc/prometheus/alert.rules.yml
    owner: prometheus
    group: prometheus
    mode: '0644'
  notify: Restart Prometheus

- name: Template Prometheus configuration file
  template:
    src: prometheus.yml.j2
    dest: /etc/prometheus/prometheus.yml
    owner: prometheus
    group: prometheus
    mode: '0644'
  notify: Restart Prometheus

- name: Template Prometheus systemd unit file
  template:
    src: prometheus.service.j2
    dest: /etc/systemd/system/prometheus.service
    owner: root
    group: root
    mode: '0644'
  notify: Reload Systemd

- name: Start and Enable Prometheus Service
  systemd:
    name: prometheus
    state: started
    enabled: yes

# 4. INSTALL LOKI NATIVELY
- name: Create Loki config directory
  file:
    path: /etc/loki
    state: directory
    owner: loki
    group: loki
    mode: '0755'

- name: Download Loki binary
  get_url:
    url: "https://github.com/grafana/loki/releases/download/v{{ loki_version }}/loki-linux-amd64.zip"
    dest: "/tmp/loki.zip"

- name: Install unzip package
  dnf:
    name: unzip
    state: present

- name: Extract Loki binary
  unarchive:
    src: "/tmp/loki.zip"
    dest: "/usr/local/bin"
    remote_src: yes
    owner: loki
    group: loki
    mode: '0755'

- name: Rename Loki binary
  command: mv /usr/local/bin/loki-linux-amd64 /usr/local/bin/loki
  args:
    creates: /usr/local/bin/loki

- name: Fix Loki binary permissions
  file:
    path: /usr/local/bin/loki
    owner: loki
    group: loki
    mode: '0755'

- name: Create Loki rules tenant directory
  file:
    path: /etc/loki/rules/fake
    state: directory
    owner: loki
    group: loki
    mode: '0755'

- name: Template Loki log alert rules file
  template:
    src: loki-alerts.yml.j2
    dest: /etc/loki/rules/fake/loki-alerts.yml
    owner: loki
    group: loki
    mode: '0644'
  notify: Restart Loki

- name: Template Loki configuration file
  template:
    src: loki-config.yml.j2
    dest: /etc/loki/config.yml
    owner: loki
    group: loki
    mode: '0644'
  notify: Restart Loki

- name: Template Loki systemd unit file
  template:
    src: loki.service.j2
    dest: /etc/systemd/system/loki.service
    owner: root
    group: root
    mode: '0644'
  notify: Reload Systemd

- name: Start and Enable Loki Service
  systemd:
    name: loki
    state: started
    enabled: yes

# 5. INSTALL ALERTMANAGER NATIVELY
- name: Create Alertmanager directories
  file:
    path: "{{ item }}"
    state: directory
    owner: prometheus
    group: prometheus
    mode: '0755'
  loop:
    - /etc/alertmanager
    - /var/lib/alertmanager

- name: Download Alertmanager binary
  get_url:
    url: "https://github.com/prometheus/alertmanager/releases/download/v{{ alertmanager_version }}/alertmanager-{{ alertmanager_version }}.linux-amd64.tar.gz"
    dest: "/tmp/alertmanager.tar.gz"

- name: Extract Alertmanager binary
  unarchive:
    src: "/tmp/alertmanager.tar.gz"
    dest: "/tmp"
    remote_src: yes

- name: Copy Alertmanager binaries to /usr/local/bin
  copy:
    src: "/tmp/alertmanager-{{ alertmanager_version }}.linux-amd64/{{ item }}"
    dest: "/usr/local/bin/{{ item }}"
    owner: prometheus
    group: prometheus
    mode: '0755'
    remote_src: yes
  loop:
    - alertmanager
    - amtool

- name: Template Alertmanager configuration file
  template:
    src: alertmanager.yml.j2
    dest: /etc/alertmanager/alertmanager.yml
    owner: prometheus
    group: prometheus
    mode: '0644'
  notify: Restart Alertmanager

- name: Template Alertmanager systemd unit file
  template:
    src: alertmanager.service.j2
    dest: /etc/systemd/system/alertmanager.service
    owner: root
    group: root
    mode: '0644'
  notify: Reload Systemd

- name: Start and Enable Alertmanager Service
  systemd:
    name: alertmanager
    state: started
    enabled: yes

# 6. INSTALL GRAFANA NATIVELY (via Official Yum Repo)
- name: Add Grafana official YUM repository
  copy:
    content: |
      [grafana]
      name=grafana
      baseurl=https://rpm.grafana.com
      repo_gpgcheck=1
      enabled=1
      gpgcheck=1
      gpgkey=https://rpm.grafana.com/gpg.key
      sslverify=1
      sslcacert=/etc/pki/tls/certs/ca-bundle.crt
    dest: /etc/yum.repos.d/grafana.repo
    owner: root
    group: root
    mode: '0644'

- name: Install Grafana OSS
  dnf:
    name: grafana
    state: present

# Fix permissions of Grafana shared folders now that grafana user exists
- name: Set ownership for Grafana shared EFS storage directories
  file:
    path: "{{ item }}"
    state: directory
    owner: grafana
    group: grafana
    mode: '0775'
  loop:
    - "/mnt/efs/grafana/{{ ansible_hostname }}"
    - "/mnt/efs/grafana/{{ ansible_hostname }}/data"
    - "/mnt/efs/grafana/{{ ansible_hostname }}/plugins"

- name: Template Grafana configuration file (grafana.ini)
  template:
    src: grafana.ini.j2
    dest: /etc/grafana/grafana.ini
    owner: root
    group: grafana
    mode: '0640'
  notify: Restart Grafana

- name: Create Grafana provisioning datasources directory
  file:
    path: /etc/grafana/provisioning/datasources
    state: directory
    owner: root
    group: grafana
    mode: '0755'

- name: Provision Prometheus and Loki data sources in Grafana
  template:
    src: datasources.yaml.j2
    dest: /etc/grafana/provisioning/datasources/datasources.yaml
    owner: root
    group: grafana
    mode: '0640'
  notify: Restart Grafana

- name: Start and Enable Grafana Service
  systemd:
    name: grafana-server
    state: started
    enabled: yes
